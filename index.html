<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Clicker</title>
<link rel="stylesheet" href="style/style.css" >
</head>
<body>

<div class="container">

    <!-- Header -->
    <header>
        <div class="coins">
            <span id="coinIcon">🪙</span>
            <span id="coinValue">0</span>
        </div>
        <div class="energy">
            ⚡
            <span id="energyValue">100</span>
        </div>
    </header>

    <!-- Main -->
    <main>
        <div class="hamster-wrapper">
            <div class="glow-ring"></div>
            <button id="hamsterBtn">🐹</button>
        </div>

        <div class="stats">
            <span>هر کلیک: <b id="clickPower">1</b></span>
            <span>در ثانیه: <b id="perSecond">0</b></span>
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="level-label">سطح <span id="level">1</span></div>
        </div>
    </main>

    <!-- Upgrades -->
    <section class="upgrades">
        <h2 class="section-title">⚡ آپگریدها</h2>
        <div class="upgrade-list">

            <div class="upgrade-card">
                <div class="upgrade-icon">🌰</div>
                <div class="upgrade-info">
                    <span class="upgrade-name">فندق بیشتر</span>
                    <span class="upgrade-desc">+۱ به هر کلیک</span>
                </div>
                <div class="upgrade-cost">
                    <span>🪙</span>
                    <span>۱۰</span>
                </div>
            </div>

            <div class="upgrade-card locked">
                <div class="upgrade-icon">🤖</div>
                <div class="upgrade-info">
                    <span class="upgrade-name">ربات کلیکر</span>
                    <span class="upgrade-desc">+۱ در ثانیه</span>
                </div>
                <div class="upgrade-cost">
                    <span>🪙</span>
                    <span>۵۰</span>
                </div>
            </div>

            <div class="upgrade-card locked">
                <div class="upgrade-icon">🏭</div>
                <div class="upgrade-info">
                    <span class="upgrade-name">کارخانه فندق</span>
                    <span class="upgrade-desc">+۵ در ثانیه</span>
                </div>
                <div class="upgrade-cost">
                    <span>🪙</span>
                    <span>۲۰۰</span>
                </div>
            </div>

            <div class="upgrade-card locked">
                <div class="upgrade-icon">⚡</div>
                <div class="upgrade-info">
                    <span class="upgrade-name">توربو شارژر</span>
                    <span class="upgrade-desc">+۳ به هر کلیک</span>
                </div>
                <div class="upgrade-cost">
                    <span>🪙</span>
                    <span>۳۵۰</span>
                </div>
            </div>

        </div>
    </section>

    <!-- Bottom Nav -->
    <nav>
        <button class="active">🏠</button>
        <button>🛒</button>
        <button>🎯</button>
        <button>🏆</button>
        <button>⚙️</button>
    </nav>

</div>

</body>
</html>
